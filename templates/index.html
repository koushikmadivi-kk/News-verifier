<!-- templates/index.html -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Fake News Detector</title>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700&display=swap" rel="stylesheet" />
  <style>
    body {
      margin: 0;
      font-family: 'Montserrat', sans-serif;
      background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
      color: #eee;
      overflow-x: hidden;
    }

    .container {
      max-width: 720px;
      margin: 60px auto;
      background: rgba(0, 0, 0, 0.7);
      padding: 40px 50px;
      border-radius: 16px;
      box-shadow: 0 0 40px #00c6ff;
      animation: fadeInUp 1.5s ease forwards;
    }

    h1 {
      font-size: 3rem;
      text-align: center;
      text-shadow: 0 0 10px #00c6ff, 0 0 20px #00c6ff;
      margin-bottom: 30px;
      animation: flicker 3s linear infinite;
    }

    textarea {
      width: 100%;
      height: 180px;
      padding: 15px;
      border-radius: 12px;
      font-size: 16px;
      border: none;
      resize: none;
    }

    button {
      background: #00c6ff;
      border: none;
      padding: 14px 26px;
      font-size: 18px;
      border-radius: 8px;
      margin-top: 20px;
      cursor: pointer;
      transition: background 0.3s ease;
    }

    button:hover {
      background: #0ff;
    }

    .result {
      font-size: 24px;
      margin-top: 30px;
      text-align: center;
      color: #0ff;
      animation: fadeInText 1s ease forwards;
    }

    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(50px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes fadeInText {
      to {
        opacity: 1;
      }
    }

    @keyframes flicker {
      0%, 19%, 21%, 23%, 25%, 54%, 56%, 100% {
        text-shadow: 0 0 5px #00c6ff, 0 0 10px #00c6ff, 0 0 20px #00c6ff,
                     0 0 40px #0ff, 0 0 80px #0ff, 0 0 90px #0ff;
      }
      20%, 22%, 24%, 55% {
        text-shadow: none;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🧠 Fake News Detector</h1>
    <form method="POST" action="/">
      <textarea name="text" placeholder="Paste your news article here..." required>{{ text }}</textarea>
      <br />
      <button type="submit">Predict</button>
    </form>

    {% if prediction %}
      <div class="result">
        <strong>Prediction:</strong> {{ prediction }}
      </div>
    {% endif %}
  </div>
</body>
</html>
